<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法律文件 — 花迹 Floriary</title>
  <style>
    :root {
      --brand-800: #2D5A3D;
      --brand-700: #3E6B4F;
      --brand-600: #5FAE6E;
      --brand-400: #8FC79A;
      --surface-mint: #EEF6F0;
      --bg: #FAFCFA;
      --surface: #FFFFFF;
      --text-primary: #212B26;
      --text-secondary: #5F6B63;
      --text-tertiary: #9AA5A0;
      --border: #E2EAE4;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--brand-700); text-decoration: none; }

    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--surface-mint);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .brand-block { display: flex; flex-direction: column; }
    .brand-name { font-size: 16px; font-weight: 700; color: var(--brand-800); }
    .brand-sub { font-size: 12px; color: var(--text-tertiary); }

    main {
      flex: 1;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
    }
    .hero-icon {
      width: 64px;
      height: 64px;
      background: var(--surface-mint);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--brand-800);
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 360px;
      margin: 0 auto;
    }

    .doc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }
    .doc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .doc-card:hover {
      border-color: var(--brand-400);
      box-shadow: 0 4px 16px rgba(62, 107, 79, 0.08);
    }
    .doc-card-icon {
      width: 40px;
      height: 40px;
      background: var(--surface-mint);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .doc-card h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--brand-800);
    }
    .doc-card p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .doc-card-arrow {
      font-size: 13px;
      color: var(--brand-600);
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meta-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .meta-block p { margin-bottom: 4px; }
    .meta-block p:last-child { margin-bottom: 0; }
    .meta-block strong { color: var(--text-primary); }

    .site-footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .site-footer a { color: var(--brand-700); }

    @media (max-width: 480px) {
      .doc-grid { grid-template-columns: 1fr; }
      main { padding: 32px 16px 48px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="logo-icon">🌿</div>
    <div class="brand-block">
      <span class="brand-name">花迹 Floriary</span>
      <span class="brand-sub">植物成长记录应用</span>
    </div>
  </header>

  <main>
    <div class="hero">
      <div class="hero-icon">📄</div>
      <h1>法律文件</h1>
      <p>使用花迹前，请阅读以下文件了解你的权利和我们的服务规范。</p>
    </div>

    <div class="doc-grid">
      <a href="privacy.html" class="doc-card">
        <div class="doc-card-icon">🔒</div>
        <h2>隐私政策</h2>
        <p>说明我们如何收集、使用、存储和保护你的个人信息。</p>
        <span class="doc-card-arrow">阅读全文 →</span>
      </a>
      <a href="terms.html" class="doc-card">
        <div class="doc-card-icon">📋</div>
        <h2>用户协议</h2>
        <p>规定账号使用规范、付费服务条款及双方权责。</p>
        <span class="doc-card-arrow">阅读全文 →</span>
      </a>
    </div>

    <div class="meta-block">
      <p><strong>生效日期：</strong>2026 年 6 月 11 日</p>
      <p><strong>开发者：</strong>Eric Liu</p>
      <p><strong>联系邮箱：</strong><a href="mailto:simplord@163.com">simplord@163.com</a></p>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 花迹 Floriary · Eric Liu · All rights reserved.</p>
  </footer>

</body>
</html>
