<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花迹 Floriary · 植物成长记录</title>
  <meta name="description" content="花迹 Floriary —— 记录每一株植物的成长，养护提醒到点不忘，数据洞察一目了然。每一寸生长，都有迹可循。">
  <script>document.documentElement.classList.remove('no-js');document.documentElement.classList.add('js');</script>
  <style>
    :root{
      --brand-900:#22432F; --brand-800:#2D5A3D; --brand-700:#3E6B4F; --brand-600:#5FAE6E; --brand-400:#8FC79A; --brand-200:#CDE6D3;
      --mint:#EEF6F0; --mint-deep:#E1EFE5;
      --bg:#F7FAF7; --surface:#FFFFFF;
      --ink:#1B2620; --ink-2:#465049; --ink-3:#5F6B63;
      --border:#E2EAE4;
      --r-lg:24px; --r-md:16px;
      --ease:cubic-bezier(.22,1,.36,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",sans-serif;
      background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    a{color:var(--brand-700);text-decoration:none}
    img{max-width:100%;display:block}
    ::selection{background:var(--brand-200)}

    /* Header */
    .hdr{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;padding:14px clamp(16px,4vw,40px);
      background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid transparent;transition:border-color .3s}
    .hdr.scrolled{border-color:var(--border)}
    .logo{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--brand-800);font-size:16px;letter-spacing:.2px}
    .logo svg{width:26px;height:26px;flex:none}
    /* Lang switch */
    .lang{margin-left:auto;position:relative}
    .lang-btn{font:inherit;font-size:13px;color:var(--ink-2);background:var(--surface);border:1px solid var(--border);border-radius:999px;
      padding:7px 13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color .2s,box-shadow .2s}
    .lang-btn:hover{border-color:var(--brand-400);box-shadow:0 2px 10px rgba(45,90,61,.08)}
    .lang-menu{position:absolute;right:0;top:calc(100% + 8px);background:var(--surface);border:1px solid var(--border);border-radius:14px;
      box-shadow:0 12px 34px rgba(27,38,32,.14);padding:6px;min-width:150px;list-style:none;opacity:0;transform:translateY(-6px) scale(.98);
      pointer-events:none;transition:opacity .18s var(--ease),transform .18s var(--ease)}
    .lang-menu.open{opacity:1;transform:none;pointer-events:auto}
    .lang-menu button{width:100%;text-align:left;font:inherit;font-size:14px;color:var(--ink);background:none;border:none;border-radius:9px;padding:9px 12px;cursor:pointer;transition:background .15s}
    .lang-menu button:hover,.lang-menu button[aria-current="true"]{background:var(--mint)}
    .lang-menu button[aria-current="true"]{color:var(--brand-700);font-weight:600}

    /* Hero */
    .hero{position:relative;max-width:1120px;margin:0 auto;padding:clamp(40px,7vw,84px) clamp(20px,5vw,40px) clamp(36px,6vw,72px);
      display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(28px,5vw,64px);align-items:center}
    .hero::before{content:"";position:absolute;inset:0;z-index:-1;
      background:
        radial-gradient(120% 90% at 12% 0%,var(--mint) 0%,transparent 55%),
        radial-gradient(90% 80% at 100% 18%,#EAF4ED 0%,transparent 60%)}
    .badge{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--brand-700);background:var(--surface);
      border:1px solid var(--brand-200);border-radius:999px;padding:6px 14px;margin-bottom:22px;box-shadow:0 2px 12px rgba(45,90,61,.06)}
    .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--brand-600);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand-600) 22%,transparent)}
    .hero h1{font-size:clamp(2.1rem,5.4vw,3.5rem);line-height:1.16;letter-spacing:-.01em;color:var(--brand-900);text-wrap:balance;font-weight:800}
    .hero h1 .em{color:var(--brand-700)}
    .hero .lead{margin-top:18px;font-size:clamp(1rem,1.6vw,1.12rem);color:var(--ink-2);max-width:34ch;text-wrap:pretty}
    .hero .meta{margin-top:26px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;color:var(--ink-3);font-size:13px}
    .hero .meta .pill{display:inline-flex;align-items:center;gap:7px;color:var(--ink-2);background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 14px}
    .hero-media{justify-self:center}

    /* Device frame */
    .device{position:relative;width:clamp(220px,30vw,288px);border-radius:46px;background:#10171300;padding:11px;
      background:linear-gradient(160deg,#26302B,#0E1411);box-shadow:0 40px 80px -28px rgba(27,38,32,.55),0 0 0 1px rgba(255,255,255,.04) inset}
    .device img{width:100%;border-radius:36px;display:block;background:#fff}
    .hero-media .device{transform:rotate(-1.5deg)}

    /* Sections */
    .section{max-width:1080px;margin:0 auto;padding:clamp(40px,7vw,80px) clamp(20px,5vw,40px)}
    .section-head{max-width:640px;margin:0 auto clamp(28px,5vw,52px);text-align:center}
    .section-head h2{font-size:clamp(1.5rem,3.2vw,2.1rem);color:var(--brand-900);letter-spacing:-.01em;font-weight:800;text-wrap:balance}
    .section-head p{margin-top:12px;color:var(--ink-2);font-size:1.02rem}

    /* Showcase rows */
    .show{display:grid;grid-template-columns:1fr 1fr;gap:clamp(28px,6vw,72px);align-items:center;margin:clamp(48px,8vw,104px) 0}
    .show:nth-child(even) .show-media{order:2}
    .show-media{display:flex;justify-content:center}
    .show-media .device{transform:rotate(1.5deg)}
    .show:nth-child(even) .show-media .device{transform:rotate(-1.5deg)}
    .show-text{max-width:30rem}
    .show-text .k{display:inline-block;font-size:13px;font-weight:700;color:var(--brand-700);margin-bottom:10px}
    .show-text h3{font-size:clamp(1.3rem,2.6vw,1.7rem);color:var(--brand-900);letter-spacing:-.01em;line-height:1.3;font-weight:800}
    .show-text p{margin-top:12px;color:var(--ink-2);font-size:1.02rem;text-wrap:pretty}

    /* More highlights — single panel, line icons (no emoji, no card grid) */
    .more{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 24px 60px -36px rgba(27,38,32,.25)}
    .more-grid{display:grid;grid-template-columns:1fr 1fr}
    .more-item{display:flex;gap:16px;padding:clamp(20px,3vw,30px);border-top:1px solid var(--border);border-left:1px solid var(--border)}
    .more-grid .more-item:nth-child(-n+2){border-top:none}
    .more-grid .more-item:nth-child(odd){border-left:none}
    .more-ico{flex:none;width:42px;height:42px;border-radius:12px;background:var(--mint);display:flex;align-items:center;justify-content:center;color:var(--brand-700)}
    .more-ico svg{width:22px;height:22px}
    .more-item h4{font-size:1.02rem;color:var(--ink);margin-bottom:4px}
    .more-item p{font-size:.92rem;color:var(--ink-2)}

    /* CTA band (drenched) */
    .cta{position:relative;overflow:hidden;background:linear-gradient(155deg,var(--brand-700),var(--brand-900));color:#fff;text-align:center;
      padding:clamp(52px,9vw,104px) 24px}
    .cta::after{content:"";position:absolute;inset:0;background:radial-gradient(70% 120% at 50% -10%,rgba(143,199,154,.28),transparent 60%);pointer-events:none}
    .cta h2{position:relative;font-size:clamp(1.7rem,4vw,2.6rem);font-weight:800;letter-spacing:-.01em;text-wrap:balance}
    .cta p{position:relative;margin-top:14px;color:#D6E8DB;font-size:1.05rem}
    .cta .store{position:relative;margin-top:26px;display:inline-flex;align-items:center;gap:9px;background:#fff;color:var(--brand-800);
      font-weight:600;font-size:.95rem;border-radius:999px;padding:12px 22px;box-shadow:0 14px 30px -10px rgba(0,0,0,.4)}

    /* Footer */
    .ft{background:var(--surface);border-top:1px solid var(--border);padding:34px 24px;text-align:center;color:var(--ink-3);font-size:13px}
    .ft .tagline{color:var(--brand-700);font-weight:600;margin-bottom:14px}
    .ft-links{display:flex;gap:22px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
    .ft-links a{color:var(--ink-2)}
    .ft-links a:hover{color:var(--brand-700)}

    /* Reveal motion (visible by default; only hidden when JS + motion-OK) */
    @media (prefers-reduced-motion:no-preference){
      .js .reveal{opacity:0;transform:translateY(22px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
      .js .reveal.in{opacity:1;transform:none}
      @keyframes heroIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
      .js .hero .anim{opacity:0;animation:heroIn .8s var(--ease) forwards}
      .js .hero .anim:nth-child(1){animation-delay:.05s}
      .js .hero .anim:nth-child(2){animation-delay:.13s}
      .js .hero .anim:nth-child(3){animation-delay:.21s}
      .js .hero .anim:nth-child(4){animation-delay:.29s}
      .js .hero-media{opacity:0;animation:heroIn .9s var(--ease) .2s forwards}
      .device,.store{transition:transform .4s var(--ease),box-shadow .4s var(--ease)}
      .show-media .device:hover,.hero-media .device:hover{transform:translateY(-8px) rotate(0deg)}
      .cta .store:hover{transform:translateY(-2px)}
    }

    @media(max-width:860px){
      .hero{grid-template-columns:1fr;text-align:center;gap:36px}
      .hero .lead,.hero .meta{margin-left:auto;margin-right:auto;justify-content:center}
      .hero-media{order:-1}
      .show{grid-template-columns:1fr;gap:28px;text-align:center}
      .show:nth-child(even) .show-media{order:0}
      .show-text{margin:0 auto}
      .more-grid{grid-template-columns:1fr}
      .more-grid .more-item:nth-child(2){border-top:1px solid var(--border)}
      .more-grid .more-item{border-left:none}
    }
  </style>
</head>

    function getParamLang(){
      try{
        var p=new URLSearchParams(location.search).get('lang');
        if(p){p=p.trim();
          if(SUP.indexOf(p)>=0)return p;
          var l=p.toLowerCase();
          if(l==='zh-hant'||l==='zh-tw'||l==='zh-hk'||l==='hant')return 'zh-Hant';
          if(l.indexOf('zh')===0)return 'zh';
          if(l.indexOf('en')===0)return 'en';
          if(l.indexOf('ja')===0)return 'ja';
          if(l.indexOf('ko')===0)return 'ko';
        }
      }catch(e){}
      return null;
    }
    function apply(lang,writeUrl){
      var d=T[lang]||T.zh;
      document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(d[k]!=null)el.textContent=d[k];});
      document.querySelectorAll('[data-i18n-html]').forEach(function(el){var k=el.getAttribute('data-i18n-html');if(d[k]!=null)el.innerHTML=d[k];});
      document.documentElement.setAttribute('data-lang',lang);
      document.documentElement.setAttribute('lang',HTMLLANG[lang]||'zh-CN');
      document.title=TITLES[lang]||TITLES.zh;
      var lbl=document.getElementById('langLabel');if(lbl)lbl.textContent=LABELS[lang];
      document.querySelectorAll('[data-set-lang]').forEach(function(b){b.setAttribute('aria-current',b.getAttribute('data-set-lang')===lang?'true':'false');});
      try{localStorage.setItem('floriary_lang',lang);}catch(e){}
      if(writeUrl){try{var u=new URL(location.href);u.searchParams.set('lang',lang);history.replaceState(null,'',u);}catch(e){}}
    }
    function initial(){
      var p=getParamLang(); if(p)return p;          // URL ?lang= 优先
      var s; try{s=localStorage.getItem('floriary_lang');}catch(e){}
      return (s&&T[s])?s:'zh';                        // 否则记忆值，再否则默认中文
    }
    document.addEventListener('DOMContentLoaded',function(){
      apply(initial(),false);
      var btn=document.getElementById('langBtn'),menu=document.getElementById('langMenu');
      function close(){menu.classList.remove('open');btn.setAttribute('aria-expanded','false');}
      btn.addEventListener('click',function(e){e.stopPropagation();var open=menu.classList.toggle('open');btn.setAttribute('aria-expanded',String(open));});
      document.addEventListener('click',close);
      document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
      menu.querySelectorAll('[data-set-lang]').forEach(function(b){b.addEventListener('click',function(){apply(b.getAttribute('data-set-lang'),true);close();});});
      // header shadow on scroll
      var hdr=document.getElementById('hdr');
      var onScroll=function(){hdr.classList.toggle('scrolled',window.scrollY>8);};onScroll();
      window.addEventListener('scroll',onScroll,{passive:true});
      // reveal on scroll (default visible if JS/IO unavailable)
      if('IntersectionObserver' in window){
        var io=new IntersectionObserver(function(es){es.forEach(function(en){if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);}});},{rootMargin:'0px 0px -10% 0px'});
        document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
      }else{document.querySelectorAll('.reveal').forEach(function(el){el.classList.add('in');});}
    });
  })();
  </script>
