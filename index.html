<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花迹 Floriary · 植物成长记录</title>
  <meta name="description" content="花迹 Floriary —— 记录每一株植物的成长，养护提醒到点不忘，数据洞察一目了然。">
  <style>
    :root{
      --brand-800:#2D5A3D; --brand-700:#3E6B4F; --brand-600:#5FAE6E; --brand-400:#8FC79A;
      --surface-mint:#EEF6F0; --bg:#FAFCFA; --surface:#FFFFFF;
      --text-primary:#212B26; --text-secondary:#5F6B63; --text-tertiary:#9AA5A0; --border:#E2EAE4;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",sans-serif;
      background:var(--bg);color:var(--text-primary);line-height:1.7;-webkit-font-smoothing:antialiased}
    a{color:var(--brand-700);text-decoration:none}
    a:hover{text-decoration:underline}
    img{max-width:100%;display:block}

    .site-header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(12px);
      border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px}
    .logo-icon{width:30px;height:30px;background:var(--surface-mint);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
    .brand{font-size:15px;font-weight:700;color:var(--brand-800)}
    .lang-switch{margin-left:auto;position:relative}
    .lang-btn{font:inherit;font-size:13px;color:var(--text-secondary);background:var(--surface);border:1px solid var(--border);
      border-radius:999px;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:6px}
    .lang-btn:hover{border-color:var(--brand-400)}
    .lang-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--border);
      border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.10);padding:6px;min-width:148px;list-style:none}
    .lang-menu[hidden]{display:none}
    .lang-menu button{width:100%;text-align:left;font:inherit;font-size:14px;color:var(--text-primary);background:none;border:none;
      border-radius:8px;padding:9px 12px;cursor:pointer}
    .lang-menu button:hover{background:var(--surface-mint)}

    .hero{max-width:880px;margin:0 auto;padding:64px 24px 40px;text-align:center}
    .hero .app-mark{width:76px;height:76px;border-radius:20px;background:linear-gradient(160deg,var(--brand-600),var(--brand-800));
      display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 20px;box-shadow:0 10px 30px rgba(45,90,61,.28)}
    .badge{display:inline-block;font-size:12px;color:var(--brand-700);background:var(--surface-mint);border:1px solid var(--brand-400);
      border-radius:999px;padding:5px 14px;margin-bottom:18px}
    .hero h1{font-size:40px;letter-spacing:-.5px;color:var(--brand-800);margin-bottom:10px}
    .hero .slogan{font-size:19px;color:var(--text-secondary);margin-bottom:18px}
    .hero .intro{font-size:16px;color:var(--text-secondary);max-width:560px;margin:0 auto}
    @media(max-width:600px){.hero{padding:44px 20px 28px}.hero h1{font-size:30px}.hero .slogan{font-size:16px}}

    .section{max-width:1040px;margin:0 auto;padding:36px 24px}
    .section-title{text-align:center;font-size:24px;color:var(--brand-800);margin-bottom:28px}
    .feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    @media(max-width:820px){.feature-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:520px){.feature-grid{grid-template-columns:1fr}}
    .feature{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px}
    .feature .fi{width:42px;height:42px;border-radius:11px;background:var(--surface-mint);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px}
    .feature h3{font-size:16px;margin-bottom:6px;color:var(--text-primary)}
    .feature p{font-size:14px;color:var(--text-secondary)}

    .shots{background:var(--surface-mint)}
    .shots-track{display:flex;gap:20px;overflow-x:auto;padding:8px 4px 16px;scroll-snap-type:x mandatory}
    .shot{flex:0 0 auto;width:228px;scroll-snap-align:center;text-align:center}
    .shot img{width:228px;border-radius:22px;border:1px solid var(--border);box-shadow:0 12px 30px rgba(45,90,61,.14);background:#fff}
    .shot .cap{font-size:13px;color:var(--text-secondary);margin-top:12px}

    .site-footer{border-top:1px solid var(--border);background:var(--surface);padding:30px 24px;text-align:center;color:var(--text-tertiary);font-size:13px}
    .footer-links{display:flex;gap:18px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
    .footer-tagline{margin-bottom:10px;color:var(--text-secondary)}
  </style>
</head>
<body>

  <header class="site-header">
    <div class="logo-icon">🌿</div>
    <span class="brand">花迹 Floriary</span>
    <div class="lang-switch">
      <button class="lang-btn" id="langBtn" aria-haspopup="true" aria-expanded="false">🌐 <span id="langLabel">简体中文</span> ▾</button>
      <ul class="lang-menu" id="langMenu" hidden>
        <li><button data-set-lang="zh">简体中文</button></li>
        <li><button data-set-lang="zh-Hant">繁體中文</button></li>
        <li><button data-set-lang="en">English</button></li>
        <li><button data-set-lang="ja">日本語</button></li>
        <li><button data-set-lang="ko">한국어</button></li>
      </ul>
    </div>
  </header>

  <section class="hero">
    <div class="app-mark">🌿</div>
    <span class="badge" data-i18n="hero.badge"></span>
    <h1>花迹 Floriary</h1>
    <p class="slogan" data-i18n="hero.slogan"></p>
    <p class="intro" data-i18n="hero.intro"></p>
  </section>

  <section class="section">
    <h2 class="section-title" data-i18n="sec.features"></h2>
    <div class="feature-grid">
      <div class="feature"><div class="fi">🌱</div><h3 data-i18n="feat.recordT"></h3><p data-i18n="feat.recordD"></p></div>
      <div class="feature"><div class="fi">⏰</div><h3 data-i18n="feat.careT"></h3><p data-i18n="feat.careD"></p></div>
      <div class="feature"><div class="fi">📊</div><h3 data-i18n="feat.insightT"></h3><p data-i18n="feat.insightD"></p></div>
      <div class="feature"><div class="fi">📚</div><h3 data-i18n="feat.libraryT"></h3><p data-i18n="feat.libraryD"></p></div>
      <div class="feature"><div class="fi">☁️</div><h3 data-i18n="feat.icloudT"></h3><p data-i18n="feat.icloudD"></p></div>
      <div class="feature"><div class="fi">📖</div><h3 data-i18n="feat.exportT"></h3><p data-i18n="feat.exportD"></p></div>
    </div>
  </section>

  <section class="shots">
    <div class="section">
      <h2 class="section-title" data-i18n="sec.shots"></h2>
      <div class="shots-track">
        <div class="shot"><img src="assets/shots/garden.png" alt="Garden" loading="lazy"><div class="cap" data-i18n="shot.garden"></div></div>
        <div class="shot"><img src="assets/shots/plant.png" alt="Plant detail" loading="lazy"><div class="cap" data-i18n="shot.plant"></div></div>
        <div class="shot"><img src="assets/shots/care.png" alt="Care" loading="lazy"><div class="cap" data-i18n="shot.care"></div></div>
        <div class="shot"><img src="assets/shots/stats.png" alt="Stats" loading="lazy"><div class="cap" data-i18n="shot.stats"></div></div>
        <div class="shot"><img src="assets/shots/member.png" alt="Member" loading="lazy"><div class="cap" data-i18n="shot.member"></div></div>
        <div class="shot"><img src="assets/shots/widget.png" alt="Widget" loading="lazy"><div class="cap" data-i18n="shot.widget"></div></div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <p class="footer-tagline" data-i18n="footer.tagline"></p>
    <div class="footer-links">
      <a href="privacy.html" data-i18n="nav.privacy"></a>
      <a href="terms.html" data-i18n="nav.terms"></a>
      <a href="support.html" data-i18n="nav.support"></a>
      <a href="mailto:simplord@163.com" data-i18n="nav.contact"></a>
    </div>
    <p>© 2026 花迹 Floriary · Eric Liu · All rights reserved.</p>
  </footer>

    function apply(lang){
      var dict=T[lang]||T.zh;
      document.querySelectorAll('[data-i18n]').forEach(function(el){
        var k=el.getAttribute('data-i18n'); if(dict[k]!=null) el.textContent=dict[k];
      });
      document.documentElement.setAttribute('data-lang',lang);
      document.documentElement.setAttribute('lang',HTMLLANG[lang]||'zh-CN');
      var lbl=document.getElementById('langLabel'); if(lbl) lbl.textContent=LABELS[lang];
      try{localStorage.setItem('floriary_lang',lang);}catch(e){}
    }
    function initial(){
      var s; try{s=localStorage.getItem('floriary_lang');}catch(e){}
      return (s&&T[s])?s:'zh';
    }
    document.addEventListener('DOMContentLoaded',function(){
      apply(initial());
      var btn=document.getElementById('langBtn'),menu=document.getElementById('langMenu');
      btn.addEventListener('click',function(e){e.stopPropagation();var h=menu.hidden;menu.hidden=!h;btn.setAttribute('aria-expanded',String(h));});
      document.addEventListener('click',function(){menu.hidden=true;btn.setAttribute('aria-expanded','false');});
      menu.querySelectorAll('[data-set-lang]').forEach(function(b){
        b.addEventListener('click',function(){apply(b.getAttribute('data-set-lang'));menu.hidden=true;});
      });
    });
