<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技术支持 — 花迹 Floriary</title>
  <style>
    :root{
      --brand-800:#2D5A3D;--brand-700:#3E6B4F;--brand-600:#5FAE6E;--brand-400:#8FC79A;
      --surface-mint:#EEF6F0;--bg:#FAFCFA;--surface:#FFFFFF;
      --text-primary:#212B26;--text-secondary:#5F6B63;--text-tertiary:#9AA5A0;--border:#E2EAE4;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",sans-serif;
      background:var(--bg);color:var(--text-primary);font-size:15px;line-height:1.75;-webkit-font-smoothing:antialiased}
    a{color:var(--brand-700);text-decoration:none}a:hover{text-decoration:underline}
    .site-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
    .logo-icon{width:32px;height:32px;background:var(--surface-mint);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .site-header .brand{font-size:15px;font-weight:600;color:var(--brand-800)}
    .lang-switch{margin-left:auto;position:relative}
    .lang-btn{font:inherit;font-size:13px;color:var(--text-secondary);background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:6px}
    .lang-btn:hover{border-color:var(--brand-400)}
    .lang-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.10);padding:6px;min-width:148px;list-style:none}
    .lang-menu[hidden]{display:none}
    .lang-menu button{width:100%;text-align:left;font:inherit;font-size:14px;color:var(--text-primary);background:none;border:none;border-radius:8px;padding:9px 12px;cursor:pointer}
    .lang-menu button:hover{background:var(--surface-mint)}
    .page-container{max-width:720px;margin:0 auto;padding:32px 24px 64px}
    .page-title-block{margin-bottom:28px}
    .page-title-block h1{font-size:26px;color:var(--brand-800);margin-bottom:6px}
    .page-title-block .subtitle{color:var(--text-secondary);font-size:14px}
    .doc-section{margin-bottom:28px}
    .doc-section h2{font-size:18px;color:var(--brand-700);margin-bottom:10px}
    .doc-section p{margin-bottom:10px}
    .doc-section ul{margin:8px 0 8px 20px}.doc-section li{margin-bottom:6px}
    .faq-q{font-weight:600;color:var(--text-primary);margin-top:14px}
    .faq-a{color:var(--text-secondary)}
    .contact-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-top:8px}
    .section-divider{border:none;border-top:1px solid var(--border);margin:28px 0}
    .site-footer{border-top:1px solid var(--border);background:var(--surface);padding:24px;text-align:center;color:var(--text-tertiary);font-size:13px}
    .site-footer a{color:var(--brand-700)}
    .footer-links{display:flex;gap:18px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
    @media(max-width:600px){.page-container{padding:24px 16px 48px}.page-title-block h1{font-size:22px}}
  </style>
</head>
<body>

  <header class="site-header">
    <div class="logo-icon">🌿</div>
    <span class="brand">花迹 Floriary</span>
    <div class="lang-switch">
      <button class="lang-btn" id="langBtn" aria-haspopup="true" aria-expanded="false">🌐 <span id="langLabel">简体中文</span> ▾</button>
      <ul class="lang-menu" id="langMenu" hidden>
        <li><button data-set-lang="zh">简体中文</button></li>
        <li><button data-set-lang="zh-Hant">繁體中文</button></li>
        <li><button data-set-lang="en">English</button></li>
        <li><button data-set-lang="ja">日本語</button></li>
        <li><button data-set-lang="ko">한국어</button></li>
      </ul>
    </div>
  </header>

  <main class="page-container">
    <div class="page-title-block">
      <h1 data-i18n="title"></h1>
      <p class="subtitle" data-i18n="subtitle"></p>
    </div>

    <section class="doc-section">
      <h2 data-i18n="aboutH"></h2>
      <p data-i18n="aboutP"></p>
    </section>

    <hr class="section-divider">

    <section class="doc-section">
      <h2 data-i18n="faqH"></h2>
      <p class="faq-q" data-i18n="q1"></p><p class="faq-a" data-i18n="a1"></p>
      <p class="faq-q" data-i18n="q2"></p><p class="faq-a" data-i18n="a2"></p>
      <p class="faq-q" data-i18n="q3"></p><p class="faq-a" data-i18n="a3"></p>
      <p class="faq-q" data-i18n="q4"></p><p class="faq-a" data-i18n="a4"></p>
      <p class="faq-q" data-i18n="q5"></p><p class="faq-a" data-i18n="a5"></p>
    </section>

    <hr class="section-divider">

    <section class="doc-section">
      <h2 data-i18n="contactH"></h2>
      <div class="contact-card">
        <p data-i18n="contactP"></p>
        <ul>
          <li><strong data-i18n="devLabel"></strong>：Eric Liu</li>
          <li><strong data-i18n="emailLabel"></strong>：<a href="mailto:simplord@163.com">simplord@163.com</a></li>
        </ul>
        <p style="color:var(--text-tertiary);font-size:13px;margin-top:12px" data-i18n="contactNote"></p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="index.html" data-i18n="nav.home"></a>
      <a href="privacy.html" data-i18n="nav.privacy"></a>
      <a href="terms.html" data-i18n="nav.terms"></a>
      <a href="support.html" data-i18n="nav.support"></a>
      <a href="mailto:simplord@163.com" data-i18n="nav.contact"></a>
    </div>
    <p>© 2026 花迹 Floriary · Eric Liu · All rights reserved.</p>
  </footer>

        q2:'サブスクの管理・解約方法は？',a2:'メンバーシップは Apple アカウントで課金されます。iPhone の「設定 →（Apple アカウント）→ サブスクリプション」でいつでも管理・自動更新の解除ができます（期間終了の24時間以上前に）。買い切りプランは自動更新されません。',

    function apply(lang){
      var dict=T[lang]||T.zh;
      document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(dict[k]!=null)el.textContent=dict[k];});
      document.documentElement.setAttribute('data-lang',lang);
      document.documentElement.setAttribute('lang',HTMLLANG[lang]||'zh-CN');
      document.title=TITLES[lang]||TITLES.zh;
      var lbl=document.getElementById('langLabel');if(lbl)lbl.textContent=LABELS[lang];
      try{localStorage.setItem('floriary_lang',lang);}catch(e){}
    }
    function getParamLang(){try{var p=new URLSearchParams(location.search).get('lang');if(p){p=p.trim();if(LABELS[p])return p;var l=p.toLowerCase();if(l==='zh-hant'||l==='zh-tw'||l==='zh-hk'||l==='hant')return 'zh-Hant';if(l.indexOf('zh')===0)return 'zh';if(l.indexOf('en')===0)return 'en';if(l.indexOf('ja')===0)return 'ja';if(l.indexOf('ko')===0)return 'ko';}}catch(e){}return null;}
    function initial(){var p=getParamLang();if(p)return p;var s;try{s=localStorage.getItem('floriary_lang');}catch(e){}return (s&&T[s])?s:'zh';}
    document.addEventListener('DOMContentLoaded',function(){
      apply(initial());
      var btn=document.getElementById('langBtn'),menu=document.getElementById('langMenu');
      btn.addEventListener('click',function(e){e.stopPropagation();var h=menu.hidden;menu.hidden=!h;btn.setAttribute('aria-expanded',String(h));});
      document.addEventListener('click',function(){menu.hidden=true;btn.setAttribute('aria-expanded','false');});
      menu.querySelectorAll('[data-set-lang]').forEach(function(b){b.addEventListener('click',function(){var L=b.getAttribute('data-set-lang');apply(L);try{var u=new URL(location.href);u.searchParams.set('lang',L);history.replaceState(null,'',u);}catch(e){}menu.hidden=true;});});
    });
  })();
  </script>
